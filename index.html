<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ready for Construction — Презентация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFB400;
            --dark: #1A1A1B;
            --white: #ffffff;
            --gray-bg: #f4f4f4;
            --font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            overflow-x: hidden;
            background-color: var(--dark);
            font-family: var(--font-family);
            font-style: italic;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            position: relative;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            overflow: hidden;
            background-color: var(--white);
        }

        h2 { font-size: 2.2rem; text-transform: uppercase; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
        h2::after { content: ""; display: block; width: 50px; height: 6px; background: var(--gold); margin-top: 10px; }

        /* СЕТКА КОНТЕНТА ДЛЯ СТРАНИЦ 2-5 */
        .content-grid { 
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 30px; 
            align-items: center; 
        }
        .text-block p { font-size: 1.3rem; line-height: 1.6; font-weight: 400; margin-bottom: 20px; }
        .image-block img { width: 100%; height: auto; max-height: 65vh; object-fit: cover; box-shadow: 20px 20px 0px -5px var(--gold); }

        /* ПРАЙС-ЛИСТ: ФИКС ВЫСОТЫ */
        .price-page { justify-content: flex-start; padding-top: 5vh; }
        .shipment-container { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        
        .important-note {
            font-size: 1rem;
            color: var(--dark);
            background: var(--gold);
            padding: 10px 15px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .price-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 100%;
        }

        .price-card { 
            background: var(--gray-bg); 
            border-left: 5px solid var(--gold); 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            min-height: 0; 
        }

        .material-thumb { 
            width: 100%; 
            height: 12vh; /* Высота зависит от экрана */
            background-size: cover; 
            background-position: center; 
            margin-bottom: 8px; 
        }

        .price-card h3 { font-size: 0.9rem; margin-bottom: 5px; color: var(--dark); }
        .price-value { 
            margin-top: auto; 
            font-size: 1.1rem; 
            font-weight: 900; 
            border-top: 2px solid var(--gold); 
            padding-top: 5px; 
        }

        /* ТЕМНЫЕ СТРАНИЦЫ */
        .dark-page { background: var(--dark); color: #fff; }
        .list-style { list-style: none; }
        .list-style li { 
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            font-size: 1.2rem;
        }
        .list-style li::before { content: "•"; color: var(--gold); margin-right: 15px; font-size: 1.8rem; }

        /* ФУТЕР / КОНТАКТЫ */
        .footer-content { text-align: center; color: white; z-index: 2; }
        .map-box { width: 100%; height: 35vh; border: 3px solid var(--gold); margin: 20px 0; }

        /* МОБИЛЬНАЯ ВЕРСИЯ (ПОРТРЕТ) */
        @media (max-width: 900px) {
            .page { padding: 0 20px; }
            h2 { font-size: 1.6rem; }
            .content-grid { grid-template-columns: 1fr; gap: 20px; }
            .text-block p { font-size: 1.1rem; margin-bottom: 10px; }
            .image-block img { max-height: 40vh; box-shadow: 10px 10px 0px -3px var(--gold); }
            
            .price-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .material-thumb { height: 10vh; }
            .important-note { font-size: 0.85rem; padding: 8px; }
            
            .swap-mobile .text-block { order: 1; }
            .swap-mobile .image-block { order: 2; }
        }

        /* КРИТИЧЕСКИЙ ФИКС ДЛЯ ГОРИЗОНТАЛЬНОГО РЕЖИМА (LANDSCAPE) */
        @media (max-height: 550px) and (orientation: landscape) {
            .page { padding: 10px 5%; justify-content: flex-start; }
            h2 { font-size: 1.2rem; margin-bottom: 5px; }
            h2::after { height: 3px; width: 30px; margin-top: 5px; }
            
            .shipment-container { flex-direction: row; gap: 10px; margin: 5px 0; }
            .important-note { font-size: 0.7rem; padding: 5px 10px; flex: 1; }
            
            .price-grid { 
                grid-template-columns: repeat(6, 1fr); /* Все в ряд */
                gap: 5px; 
            }
            .material-thumb { display: none; } /* Убираем фото для экономии места */
            .price-card { padding: 5px; border-left-width: 3px; }
            .price-card h3 { font-size: 0.65rem; }
            .price-value { font-size: 0.8rem; padding-top: 3px; }
            
            .content-grid { grid-template-columns: 1.2fr 0.8fr; gap: 15px; }
            .image-block img { max-height: 50vh; width: auto; }
            .text-block p { font-size: 0.9rem; }
            .map-box { height: 25vh; margin: 10px 0; }
        }

        /* КНОПКА СВЯЗИ */
        .phone-float {
            position: fixed; width: 55px; height: 55px; bottom: 20px; right: 20px;
            background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-decoration: none;
        }
        .phone-float svg { width: 28px; height: 28px; fill: var(--dark); }

        #hero-page { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('2026-03-26%2010-50-48.jpg') center/cover;
            color: white; text-align: center;
        }
        #hero-page h1 { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; }
    </style>
</head>
